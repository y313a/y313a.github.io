<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v7 محمل حمودي الذكي | Universal Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --accent: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        #results {
            margin-top: 30px;
            display: grid;
            gap: 20px;
        }

        .media-card {
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fafafa;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .download-item:hover {
            border-color: var(--primary);
        }

        .format-label {
            font-weight: bold;
            color: var(--text);
        }

        .btn-dl {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-dl:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الذكي 🚀</h1>
        <p>انسخ الرابط وشوف الشغل المعدل بداخل صفحتك!</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="حط رابط يوتيوب، تيك توك، انستا...">
        <button id="fetchBtn" onclick="fetchVideo()">تحليل الرابط</button>
    </div>

    <div id="loader" class="loader">
        <div style="margin-bottom: 10px;">جاري سحب الملف بداخل صفحتك، اصبرلي حموديتي...</div>
        <img src="https://i.gifer.com/ZZ5H.gif" width="30" alt="loading">
    </div>

    <div id="results"></div>
</div>

<script>
    async function fetchVideo() {
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');
        const url = urlInput.value.trim();

        if (!url) {
            alert("وين الرابط حمودي؟ حطه بالمربع أول شي عيوني!");
            return;
        }

        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        try {
            // استخدام نظام السحب المباشر API بدلاً من iframe المحجوب
            const response = await fetch(`https://api.vkrdown.com/server?vurl=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data && data.data && data.data.downloads) {
                let html = `
                    <div class="media-card">
                        <h3 style="margin:0;">الروابط جاهزة حموديتي ✅</h3>
                        <p style="font-size:0.9rem; color:#64748b; margin-bottom:15px;">اختر الجودة اللي تناسبك للتحميل المباشر:</p>
                        <div id="downloadList">`;
                
                data.data.downloads.forEach(dl => {
                    html += `
                        <div class="download-item">
                            <span class="format-label">${dl.format} (${dl.quality})</span>
                            <a href="${dl.url}" class="btn-dl" target="_blank" rel="noopener noreferrer">Download</a>
                        </div>`;
                });
                
                html += `</div></div>`;
                results.innerHTML = html;
            } else {
                throw new Error("No download links found");
            }

        } catch (error) {
            console.error('Error:', error);
            results.innerHTML = `<div style="text-align:center; color: #ef4444; padding: 20px;">الرابط معاند شوية، تأكد منه وجرب مرة ثانية حمودي!</div>`;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    document.getElementById('urlInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { fetchVideo(); }
    });
</script>
</body>
</html>
