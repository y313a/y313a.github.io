<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حمودي أوديو v30 | السرعة القصوى</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00ff88; --dark: #050505; --card: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--dark); 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .wrapper {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        h1 { color: var(--main); font-size: 2.2rem; margin-bottom: 30px; font-weight: 900; }
        input {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 2px solid #333;
            background: #000;
            color: var(--main);
            font-size: 1rem;
            outline: none;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: var(--main);
            color: #000;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        .loader { display: none; margin: 20px 0; color: var(--main); font-weight: 700; }
        .result { margin-top: 30px; padding: 20px; background: #1a1a1a; border-radius: 20px; display: none; }
        .dl-link {
            display: block;
            background: #fff;
            color: #000;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>صوتيات حمودي 🔱</h1>
    <input type="text" id="url" placeholder="انسخ رابط اليوتيوب هنا...">
    <button onclick="fetchAudio()">سحب ملف الـ MP3</button>
    
    <div id="loading" class="loader">جاري اختراق السيرفر وسحب الصوت...</div>
    
    <div id="resBox" class="result">
        <p id="title" style="margin-bottom: 10px; color: var(--main);"></p>
        <a id="downloadBtn" href="#" class="dl-link" target="_blank">اضغط هنا للتحميل المباشر</a>
    </div>
</div>

<script>
    async function fetchAudio() {
        const urlInput = document.getElementById('url').value;
        const loading = document.getElementById('loading');
        const resBox = document.getElementById('resBox');
        const dlBtn = document.getElementById('downloadBtn');

        if(!urlInput) return alert("حمودي، الرابط وين؟");

        loading.style.display = "block";
        resBox.style.display = "none";

        try {
            // استخدام API محرك Cobalt العالمي - بدون وسيط
            const response = await fetch('https://api.cobalt.tools/api/json', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    url: urlInput,
                    isAudioOnly: true, // هنا السحر، يسحب بس صوت
                    aFormat: 'mp3',
                    vQuality: '720'
                })
            });

            const data = await response.json();

            if(data.url) {
                dlBtn.href = data.url;
                document.getElementById('title').innerText = "تم تجهيز الملف الصوتي!";
                resBox.style.display = "block";
            } else {
                throw new Error("السيرفر رفض الطلب، جرب رابط ثاني.");
            }
        } catch (err) {
            alert("يا ستار! " + err.message);
        } finally {
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
