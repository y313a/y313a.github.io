<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v19 محمل حمودي الذكي | Open Source Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --accent: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        #results {
            margin-top: 30px;
            display: grid;
            gap: 20px;
        }

        .media-card {
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fafafa;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .download-item:hover {
            border-color: var(--primary);
        }

        .format-label {
            font-weight: bold;
            color: var(--text);
        }

        .btn-dl {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-dl:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .server-status {
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الذكي 🚀</h1>
        <p>النسخة v19 - محركات الـ Open Source المجانية</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="حط رابط يوتيوب أو تيك توك...">
        <button id="fetchBtn" onclick="fetchVideo()">تحليل الرابط</button>
    </div>

    <div id="loader" class="loader">
        <div style="margin-bottom: 10px;">جاري فحص السيرفرات المتاحة وسحب الرابط...</div>
        <div id="statusText" class="server-status"></div>
        <img src="https://i.gifer.com/ZZ5H.gif" width="30" alt="loading">
    </div>

    <div id="results"></div>
</div>

<script>
    // مصفوفة سيرفرات يوتيوب (Piped API) المجانية والمفتوحة
    const pipedInstances = [
        'https://pipedapi.kavin.rocks',
        'https://api.piped.projectsegfau.lt',
        'https://piped-api.garudalinux.org',
        'https://pipedapi.in.projectsegfau.lt'
    ];

    // استخراج ID اليوتيوب من الرابط
    function getYoutubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function fetchVideo() {
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');
        const statusText = document.getElementById('statusText');
        const url = urlInput.value.trim();

        if (!url) { alert("وين الرابط حموديتي؟"); return; }

        loader.style.display = "block";
        results.innerHTML = "";
        statusText.innerText = "";
        btn.disabled = true;

        try {
            // فحص إذا كان الرابط يوتيوب
            const ytId = getYoutubeId(url);
            
            if (ytId) {
                let success = false;
                // تجربة السيرفرات واحد ورى الثاني (مصفوفة الـ Fallback)
                for (let i = 0; i < pipedInstances.length; i++) {
                    try {
                        statusText.innerText = `دا أجرب سيرفر يوتيوب رقم ${i + 1}...`;
                        const response = await fetch(`${pipedInstances[i]}/streams/${ytId}`);
                        
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.videoStreams) {
                                // فلترة روابط الفيديو فقط واستبعاد الـ audio only
                                const videoStreams = data.videoStreams.filter(v => v.videoOnly === false);
                                // ترتيب حسب الجودة (أعلى جودة أولاً)
                                videoStreams.sort((a, b) => b.bitrate - a.bitrate);
                                
                                const bestVideo = videoStreams[0];
                                const audioStream = data.audioStreams.sort((a, b) => b.bitrate - a.bitrate)[0];

                                results.innerHTML = `
                                    <div class="media-card">
                                        <h3 style="margin:0; text-align:center;">تم سحب فيديو يوتيوب ✅</h3>
                                        <p style="text-align:center; font-size:0.9rem;">${data.title}</p>
                                        <div class="download-item">
                                            <span class="format-label">فيديو (${bestVideo.quality})</span>
                                            <a href="${bestVideo.url}" class="btn-dl" target="_blank">تحميل مباشر</a>
                                        </div>
                                        ${audioStream ? `
                                        <div class="download-item">
                                            <span class="format-label">صوت فقط (Audio)</span>
                                            <a href="${audioStream.url}" class="btn-dl" target="_blank">تحميل الصوت</a>
                                        </div>` : ''}
                                    </div>`;
                                success = true;
                                break; // إذا نجح نكسر الحلقة (Loop)
                            }
                        }
                    } catch (err) {
                        console.warn(`سيرفر ${pipedInstances[i]} فشل، راح أحول عالبعده...`);
                    }
                }
                
                if (!success) {
                    throw new Error("كل سيرفرات اليوتيوب محظورة حالياً بالـ DNS.");
                }

            } else if (url.includes('tiktok.com')) {
                // التعامل مع تيك توك عبر TikWM
                statusText.innerText = `دا أسحب من سيرفرات تيك توك المباشرة...`;
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.code === 0 && data.data) {
                    const videoData = data.data;
                    results.innerHTML = `
                        <div class="media-card">
                            <h3 style="margin:0; text-align:center;">تيك توك جاهز يا بطل ✅</h3>
                            <p style="text-align:center; font-size:0.9rem;">${videoData.title}</p>
                            <div class="download-item">
                                <span class="format-label">فيديو (بدون علامة)</span>
                                <a href="${videoData.play}" class="btn-dl" target="_blank">تحميل مباشر</a>
                            </div>
                            ${videoData.music ? `
                            <div class="download-item">
                                <span class="format-label">صوت (MP3)</span>
                                <a href="${videoData.music}" class="btn-dl" target="_blank">تحميل الصوت</a>
                            </div>` : ''}
                        </div>`;
                } else {
                    throw new Error("فشل سحب التيك توك.");
                }
            } else {
                 results.innerHTML = `
                    <div class="media-card" style="border-color: #fca5a5; background: #fef2f2;">
                        <h3 style="margin:0; color:#b91c1c;">عذراً حموديتي</h3>
                        <p style="font-size:0.9rem; text-align:center;">هالنسخة مخصصة ليوتيوب وتيك توك بس.</p>
                    </div>`;
            }

        } catch (error) {
            console.error('Error Details:', error);
            results.innerHTML = `
                <div class="media-card" style="border-color: #fca5a5; background: #fef2f2;">
                    <h3 style="margin:0; color:#b91c1c;">صار خطأ بالاتصال!</h3>
                    <p style="font-size:0.9rem; text-align:center;">السيرفرات العالمية دا تواجه صعوبة بالاتصال من العراق. جرب غير رابط أو انتظر شوية.</p>
                </div>`;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    document.getElementById('urlInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { fetchVideo(); }
    });
</script>
</body>
</html>
