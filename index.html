<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v21 محمل حمودي الذكي | Powered by Cobalt</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #121212; /* سويته دارك مود حتى يلوگ لشغل المصممين */
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            margin-top: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: #bb86fc;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }

        .header p {
            color: #a1a1aa;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 18px 24px;
            border: 2px solid #333;
            border-radius: 16px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            background: #2c2c2c;
            color: #fff;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #bb86fc;
        }

        button#fetchBtn {
            padding: 0 32px;
            background: #bb86fc;
            color: #000;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        button#fetchBtn:hover {
            background: #9965f4;
            transform: translateY(-2px);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #bb86fc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #results { margin-top: 30px; }

        .media-card {
            border: 1px solid #333;
            padding: 24px;
            border-radius: 20px;
            background: #2c2c2c;
            text-align: center;
        }

        .btn-dl {
            display: block;
            margin-top: 15px;
            padding: 16px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: background 0.3s;
        }

        .btn-dl:hover { background: #059669; }

        .error-card {
            background: #451a1a;
            border: 1px solid var(--danger);
            padding: 20px;
            border-radius: 16px;
            color: #ff8080;
            text-align: center;
        }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            button#fetchBtn { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الذكي 🚀</h1>
        <p>النسخة v21 - المحرك السريع (Cloudflare Edition)</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="حط رابط يوتيوب، تيك توك، أو انستا...">
        <button id="fetchBtn" onclick="fetchMedia()">تحليل الرابط</button>
    </div>

    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div id="statusText" style="font-weight: bold; color: #bb86fc;">جاري تجاوز الحظر وسحب الرابط...</div>
    </div>

    <div id="results"></div>
</div>

<script>
    // رابط الوركر مالتك اللي دزيتلياه
    const WORKER_URL = "https://dw.hurhar.workers.dev/";

    async function fetchMedia() {
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');
        const url = urlInput.value.trim();

        if (!url) {
            showError("وين الرابط محمديتي؟ الحقل فارغ!");
            return;
        }

        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            const data = await response.json();

            if (!response.ok || data.status === 'error') {
                throw new Error(data.text || "السيرفر مديجاوب، تأكد من الرابط.");
            }

            // معالجة استجابة Cobalt
            if (data.status === 'stream' || data.status === 'redirect') {
                displayResults("الفيديو جاهز للتحميل", data.url);
            } else if (data.status === 'picker') {
                // إذا كان بوست انستا بيه صور وفيديوات هواية، ناخذ أول واحد
                displayResults("تم العثور على محتوى متعدد، جاري سحب الأول", data.picker[0].url);
            } else {
                throw new Error("نوع الرابط غير مدعوم أو محمي بشكل قوي.");
            }

        } catch (error) {
            showError(error.message);
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function displayResults(title, downloadUrl) {
        const results = document.getElementById('results');
        results.innerHTML = `
            <div class="media-card">
                <div style="font-weight: 700; margin-bottom: 10px;">${title}</div>
                <p style="color: #a1a1aa; font-size: 0.9rem; margin-bottom: 15px;">تم استخراج الرابط المباشر بنجاح بجودة عالية</p>
                <a href="${downloadUrl}" class="btn-dl" target="_blank">اضغط هنا للتحميل المباشر</a>
            </div>`;
    }

    function showError(msg) {
        const results = document.getElementById('results');
        results.innerHTML = `<div class="error-card"><strong>خلل تقني:</strong> ${msg}</div>`;
    }

    document.getElementById('urlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchMedia();
    });
</script>
</body>
</html>
