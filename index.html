<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v16 محمل حمودي العالمي | The Final Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #059669;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            margin-top: 40px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 2rem; }

        .input-group {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            padding: 8px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-family: 'Cairo';
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }
        button:disabled { background: #94a3b8; }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: var(--primary);
            font-weight: bold;
        }

        #results { margin-top: 25px; }

        .media-card {
            background: #f0fdf4;
            border: 2px solid #bcf0da;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
        }

        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .download-btn:hover { box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>محمل حمودي الذكي v16 🚀</h1>
        <p>هالمرة الشغل نظيف وبدون بروكسيات تعبانة!</p>
    </div>

    <div class="input-group">
        <input type="text" id="urlInput" placeholder="حط رابط يوتيوب أو تيك توك هنا...">
        <button id="fetchBtn" onclick="processVideo()">تحليل</button>
    </div>

    <div id="loader" class="loader">جاري جلب الرابط المباشر حموديتي... ⏳</div>
    <div id="results"></div>
</div>

<script>
    async function processVideo() {
        const url = document.getElementById('urlInput').value.trim();
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');

        if (!url) return alert("وين الرابط يا بطل؟");

        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        try {
            // استخدام Cobalt API الأصلي معHeaders تمنع الـ CORS
            const response = await fetch('https://api.cobalt.tools/api/json', {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    url: url,
                    videoQuality: '720',
                    filenamePattern: 'basic'
                })
            });

            const data = await response.json();

            if (data.status === 'stream' || data.url) {
                const finalUrl = data.url;
                results.innerHTML = `
                    <div class="media-card">
                        <h3 style="margin:0; color:#065f46;">تم السحب بنجاح! ✅</h3>
                        <p>الفيديو جاهز للتحميل بداخل صفحتك</p>
                        <a href="${finalUrl}" class="download-btn" target="_blank" download>اضغط هنا للتحميل المباشر</a>
                    </div>`;
            } else if (data.status === 'error') {
                throw new Error(data.text);
            } else {
                throw new Error("حدث خطأ غير متوقع");
            }
        } catch (error) {
            console.error(error);
            results.innerHTML = `
                <div style="padding:15px; background:#fef2f2; border:1px solid #fee2e2; border-radius:12px; color:#991b1b; text-align:center;">
                    <b>خطأ بالسيرفر حمودي:</b> السيرفر عليه ضغط حالياً أو الرابط محمي. جرب مرة ثانية بعد ثواني.
                </div>`;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
