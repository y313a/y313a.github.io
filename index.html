<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل حمودي الملكي v28 | Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* رجعتلك الـ CSS الضخم اللي يليق بمصمم */
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --accent-color: #22c55e;
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --input-bg: #242424;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error-red: #ff4d4d;
            --shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .main-wrapper {
            width: 100%;
            max-width: 850px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 35px;
            padding: 50px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 180deg at 50% 50%, transparent 0%, var(--primary-color) 25%, transparent 50%);
            animation: rotate 10s linear infinite;
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .content-inner { position: relative; z-index: 1; }

        .brand-header { text-align: center; margin-bottom: 40px; }
        .brand-header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(to left, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .brand-header p { color: var(--text-dim); font-size: 1.1rem; }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-wrapper { position: relative; }
        input[type="text"] {
            width: 100%;
            padding: 22px 30px;
            border-radius: 20px;
            border: 2px solid #333;
            background: var(--input-bg);
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 25px rgba(0,210,255,0.2);
            transform: translateY(-2px);
        }

        .action-btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: #000;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,210,255,0.4);
        }

        .action-btn:active { transform: translateY(0); }
        .action-btn:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Loader Styles */
        #loader { display: none; margin: 40px 0; }
        .custom-loader {
            width: 60px;
            height: 60px;
            border: 6px solid #222;
            border-top: 6px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Result Area */
        #resultArea { margin-top: 40px; }
        .video-card {
            background: #252525;
            border-radius: 25px;
            padding: 30px;
            border: 1px solid #383838;
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumbnail-box {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .download-list { display: flex; flex-direction: column; gap: 12px; }
        .dl-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: #333;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }
        .dl-item:hover { background: var(--accent-color); color: #000; font-weight: 700; }
        .dl-item .label { font-weight: 700; }
        .dl-item .size { font-size: 0.9rem; opacity: 0.8; }

        .error-msg {
            background: rgba(255, 77, 77, 0.1);
            color: var(--error-red);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--error-red);
            font-weight: 700;
        }

        /* Footer */
        .footer-note { margin-top: 40px; color: #555; font-size: 0.9rem; font-weight: 700; }

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="glass-card">
        <div class="content-inner">
            <header class="brand-header">
                <h1>حمودي بورتال v28 🔱</h1>
                <p>النسخة الفولاذية | أداة المصممين المحترفين</p>
            </header>

            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="targetUrl" placeholder="ضع الرابط هنا (TikTok, YouTube, Insta, FB)...">
                </div>
                <button id="mainBtn" class="action-btn" onclick="executeDownload()">
                    <span>سحب البيانات الآن</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
            </div>

            <div id="loader">
                <div class="custom-loader"></div>
                <p style="text-align:center; color:var(--primary-color);">جاري تجاوز الحظر وسحب الروابط المباشرة...</p>
            </div>

            <div id="resultArea"></div>

            <div class="footer-note" style="text-align: center;">
                &copy; 2026 Developed for Muhammad (Hamoudi) | No API Keys Required
            </div>
        </div>
    </div>
</div>

<script>
    const WORKER_ENDPOINT = "https://dw.hurhar.workers.dev/";

    async function executeDownload() {
        const input = document.getElementById('targetUrl');
        const resArea = document.getElementById('resultArea');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('mainBtn');
        const url = input.value.trim();

        if(!url) {
            alert("محمديتي، الحقل فارغ!");
            return;
        }

        resArea.innerHTML = "";
        loader.style.display = "block";
        btn.disabled = true;

        try {
            const response = await fetch(WORKER_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            const result = await response.json();

            if(result.error || !result.data) {
                throw new Error("السيرفر مشغول أو الرابط غير مدعوم حالياً.");
            }

            const media = result.data;
            let html = `
                <div class="video-card">
                    <h3 style="margin-bottom:15px; color:var(--primary-color);">${media.title || 'تم العثور على الفيديو'}</h3>
                    ${media.thumbnail ? `<div class="thumbnail-box" style="background-image: url('${media.thumbnail}')"></div>` : ''}
                    <div class="download-list">
            `;

            // معالجة روابط الفيديو
            if(media.medias && media.medias.length > 0) {
                media.medias.forEach(item => {
                    html += `
                        <a href="${item.url}" class="dl-item" target="_blank" rel="noopener">
                            <span class="label">تحميل بصيغة ${item.extension.toUpperCase()} (${item.quality})</span>
                            <span class="size">Direct Link</span>
                        </a>
                    `;
                });
            } else if (media.url) {
                html += `
                    <a href="${media.url}" class="dl-item" target="_blank" rel="noopener">
                        <span class="label">تحميل الفيديو المباشر</span>
                        <span class="size">HD</span>
                    </a>
                `;
            }

            html += `</div></div>`;
            resArea.innerHTML = html;

        } catch (e) {
            resArea.innerHTML = `<div class="error-msg">يا ستار! صار خلل: ${e.message}</div>`;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    // Enter Key Support
    document.getElementById('targetUrl').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') executeDownload();
    });
</script>

</body>
</html>
