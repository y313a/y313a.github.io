<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v22 محمل حمودي الذكي | Cobalt v10 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #bb86fc;
            --primary-hover: #9965f4;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #03dac6;
            --danger: #cf6679;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            margin-top: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 10px rgba(187, 134, 252, 0.3);
        }

        .header p {
            color: #a1a1aa;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 18px 24px;
            border: 2px solid #333;
            border-radius: 16px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            background: #2c2c2c;
            color: #fff;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(187, 134, 252, 0.1);
        }

        button#fetchBtn {
            padding: 0 32px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        button#fetchBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button#fetchBtn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loader-spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #333;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #results { margin-top: 30px; }

        .media-card {
            border: 1px solid #333;
            padding: 24px;
            border-radius: 20px;
            background: #2c2c2c;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-dl {
            display: block;
            margin-top: 15px;
            padding: 16px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .btn-dl:hover {
            background: #00b3a6;
            transform: scale(1.02);
        }

        .error-card {
            background: #451a1a;
            border: 1px solid var(--danger);
            padding: 20px;
            border-radius: 16px;
            color: #ff8080;
            text-align: center;
        }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            button#fetchBtn { padding: 18px; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الذكي 🚀</h1>
        <p>النسخة v21 - تحديث Cobalt v10 (تجاوز الـ CORS)</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="الصق رابط (YouTube, TikTok, Instagram)...">
        <button id="fetchBtn" onclick="fetchMedia()">تحليل الرابط</button>
    </div>

    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div id="statusText" style="font-weight: bold; color: var(--primary);">جاري التواصل مع السيرفر وتخطي الحظر...</div>
    </div>

    <div id="results"></div>
</div>

<script>
    // رابط الوركر مالتك - تم التأكد منه
    const WORKER_URL = "https://dw.hurhar.workers.dev/";

    async function fetchMedia() {
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');
        const url = urlInput.value.trim();

        if (!url) {
            showError("محمديتي، الرابط وين؟ لا تعبني حطه بالحقل!");
            return;
        }

        // تصفير واجهة النتائج
        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        try {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.text || `خطأ سيرفر: ${response.status}`);
            }

            const data = await response.json();

            // معالجة استجابة Cobalt v10 الجديدة
            if (data.status === 'error') {
                throw new Error(data.text || "السيرفر رفض الرابط، جرب غير واحد.");
            }

            // v10 يرجع الرابط مباشرة بـ data.url أو بداخل الـ picker
            if (data.url) {
                displayResults("الفيديو جاهز للتحميل بنجاح 🎉", data.url);
            } else if (data.status === 'picker' && data.picker && data.picker.length > 0) {
                // في حال وجود عدة جودات أو عدة صور/فيديوهات
                displayResults("تم العثور على محتوى متعدد، جاري سحب الرابط الرئيسي", data.picker[0].url);
            } else if (data.status === 'redirect' && data.url) {
                 displayResults("تم استخراج الرابط المباشر", data.url);
            } else {
                throw new Error("السيرفر ما گدر يحصل رابط مباشر، يمكن الفيديو محمي.");
            }

        } catch (error) {
            showError(error.message);
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function displayResults(title, downloadUrl) {
        const results = document.getElementById('results');
        results.innerHTML = `
            <div class="media-card">
                <div style="font-weight: 700; margin-bottom: 10px; color: var(--accent); font-size: 1.2rem;">${title}</div>
                <p style="color: #a1a1aa; font-size: 0.95rem; margin-bottom: 20px;">تم استخراج الفيديو بأعلى جودة ممكنة (تجاوز حظر الـ DNS بنجاح)</p>
                <a href="${downloadUrl}" class="btn-dl" target="_blank" rel="noopener noreferrer">اضغط هنا للتحميل المباشر</a>
                <p style="margin-top: 15px; font-size: 0.8rem; color: #666;">إذا انفتح الفيديو بصفحة ثانية، دوس عليه "حفظ باسم" (Save As)</p>
            </div>`;
    }

    function showError(msg) {
        const results = document.getElementById('results');
        // تنظيف الرسائل التقنية الطويلة من Cobalt v7 القديم إذا ظهرت
        let userMsg = msg;
        if (msg.includes("v7 api has been shut down")) {
            userMsg = "عيني حمودي، لازم تحدث كود الوركر (Worker) بـ كلاودفلير للنسخة v10 مثل ما شرحتلك!";
        }
        results.innerHTML = `<div class="error-card"><strong>خلل تقني:</strong><br>${userMsg}</div>`;
    }

    document.getElementById('urlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchMedia();
    });
</script>
</body>
</html>
