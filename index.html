<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v5 محمل حمودي الأسطوري | Universal Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --accent: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        #results {
            margin-top: 30px;
            display: grid;
            gap: 20px;
        }

        .media-card {
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fafafa;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .media-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .media-details h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        .download-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-dl {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            display: inline-block;
        }

        .btn-dl:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            .media-info { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الأسطوري 🚀</h1>
        <p>يوتيوب، تيك توك، انستا.. كله شغال هسة!</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="حط الرابط هنا يا بطل...">
        <button id="fetchBtn" onclick="fetchInfo()">تحليل وتحميل</button>
    </div>

    <div id="loader" class="loader">
        <div style="margin-bottom: 10px;">جاري تجهيز رابط التحميل حموديتي...</div>
        <img src="https://i.gifer.com/ZZ5H.gif" width="30" alt="loading">
    </div>

    <div id="results"></div>
</div>

<script>
    function fetchInfo() {
        const urlInput = document.getElementById('urlInput');
        const results = document.getElementById('results');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('fetchBtn');

        const url = urlInput.value.trim();

        if (!url) {
            alert("وين الرابط حمودي؟ حطه بالمربع أول شي عيوني!");
            return;
        }

        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        // الطريقة الذهبية: استخدام محرك SS المتجاوز للقيود لضمان عمل اليوتيوب والتيك توك
        setTimeout(() => {
            const finalDownloadUrl = url.replace(/(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be|tiktok\.com|instagram\.com)\//, "https://ss$3/");
            
            // في حال لم ينجح الاستبدال التلقائي، نستخدم الواجهة المباشرة
            const fallbackUrl = "https://savefrom.net/?url=" + encodeURIComponent(url);

            results.innerHTML = `
                <div class="media-card">
                    <div class="media-info">
                        <div class="media-details">
                            <h3>جاهز للتحميل يا ملك 👑</h3>
                            <p style="color:#64748b; margin-bottom:15px;">اضغط على الزر أدناه وسيتم توجيهك لصفحة اختيار الجودة مباشرة.</p>
                            <div class="download-btns">
                                <a href="${fallbackUrl}" class="btn-dl" target="_blank" rel="noopener noreferrer">
                                     إضغط هنا واختار الجودة (Download)
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            loader.style.display = "none";
            btn.disabled = false;
        }, 1000);
    }

    document.getElementById('urlInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { fetchInfo(); }
    });
</script>
</body>
</html>
