<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v22 محمل حمودي الذكي | Cobalt v10 Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #bb86fc;
            --primary-hover: #9965f4;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #03dac6;
            --danger: #cf6679;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            margin-top: 40px;
            border: 1px solid #333;
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header h1 { color: var(--primary); font-size: 2.3rem; margin: 0; text-shadow: 0 2px 10px rgba(187,134,252,0.2); }
        .header p { color: #a1a1aa; font-size: 1rem; }

        .input-group { display: flex; gap: 12px; margin-bottom: 25px; }
        input {
            flex: 1; padding: 18px; border: 2px solid #333; border-radius: 16px;
            background: #2c2c2c; color: #fff; font-family: inherit; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; }

        button#fetchBtn {
            padding: 0 30px; background: var(--primary); color: #000; border: none;
            border-radius: 16px; cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        button#fetchBtn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        button#fetchBtn:disabled { background: #444; cursor: not-allowed; }

        .loader { display: none; text-align: center; padding: 20px; }
        .loader-spinner {
            width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .media-card {
            background: #2c2c2c; padding: 25px; border-radius: 20px; text-align: center;
            border: 1px solid var(--accent); animation: fadeIn 0.4s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-dl {
            display: inline-block; width: 100%; padding: 16px; background: var(--accent);
            color: #000; text-decoration: none; border-radius: 12px; font-weight: 700; margin-top: 15px;
        }
        .error-card { background: #451a1a; color: #ff8080; padding: 20px; border-radius: 16px; border: 1px solid var(--danger); }

        @media (max-width: 600px) { .input-group { flex-direction: column; } button#fetchBtn { padding: 18px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الذكي 🚀</h1>
        <p>النسخة المستقرة v22 | Cobalt v10 Engine</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="أدخل رابط الفيديو هنا...">
        <button id="fetchBtn" onclick="fetchMedia()">تحليل الرابط</button>
    </div>

    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div style="color: var(--primary);">جاري كسر القيود وسحب الرابط...</div>
    </div>

    <div id="results"></div>
</div>

<script>
    const WORKER_URL = "https://dw.hurhar.workers.dev/";

    async function fetchMedia() {
        const input = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');
        
        if (!input.value.trim()) {
            showError("محمديتي، الحقل فارغ! حط الرابط فدوة لشاربك.");
            return;
        }

        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        try {
            const resp = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: input.value.trim() })
            });

            // التحقق إذا كان الوركر نفسه شغال
            if (!resp.ok) throw new Error(`السيرفر (الوركر) مديجاوب. كود الخطأ: ${resp.status}`);

            const data = await resp.json();

            // معالجة رد Cobalt v10
            if (data.status === 'error') {
                // إذا طلع خطأ من Cobalt نفسه
                throw new Error(data.text || "Cobalt رفض الطلب. جرب غير رابط أو انتظر شوية.");
            }

            let finalUrl = "";
            if (data.url) {
                finalUrl = data.url;
            } else if (data.status === 'picker' && data.picker && data.picker.length > 0) {
                finalUrl = data.picker[0].url;
            } else if (data.status === 'redirect' && data.url) {
                finalUrl = data.url;
            }

            if (finalUrl) {
                results.innerHTML = `
                    <div class="media-card">
                        <div style="color: var(--accent); font-weight: 700; font-size: 1.2rem; margin-bottom: 10px;">تم تجهيز الرابط بنجاح! 🎉</div>
                        <p style="font-size: 0.9rem; color: #ccc;">اضغط على الزر أدناه لبدء التحميل المباشر.</p>
                        <a href="${finalUrl}" class="btn-dl" target="_blank" rel="noopener noreferrer">تحميل الفيديو الآن</a>
                        <p style="margin-top: 15px; font-size: 0.75rem; color: #888;">ملاحظة: إذا فتح الفيديو بمتصفحك، اضغط مطولاً واختار "حفظ الفيديو".</p>
                    </div>`;
            } else {
                throw new Error("مالقينا رابط مباشر بالرد. السيرفر يمكن محظور مؤقتاً.");
            }

        } catch (err) {
            showError(err.message);
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function showError(msg) {
        document.getElementById('results').innerHTML = `
            <div class="error-card">
                <strong>عذراً حمودي:</strong><br>${msg}
            </div>`;
    }

    document.getElementById('urlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchMedia();
    });
</script>
</body>
</html>
