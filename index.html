<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v21 محمل حمودي الذكي | Invidious Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --accent: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin-top: 40px;
            transition: transform 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        .header p {
            color: #64748b;
            font-size: 1.1rem;
            margin: 0;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            position: relative;
        }

        input {
            flex: 1;
            padding: 18px 24px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8fafc;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button#fetchBtn {
            padding: 0 32px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button#fetchBtn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        button#fetchBtn:active {
            transform: translateY(0);
        }

        button#fetchBtn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 30px;
            animation: fadeIn 0.3s ease;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #results {
            margin-top: 30px;
            display: grid;
            gap: 20px;
        }

        .media-card {
            border: 1px solid #e2e8f0;
            padding: 24px;
            border-radius: 20px;
            background: #ffffff;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text);
            text-align: center;
        }

        .download-options {
            display: grid;
            gap: 12px;
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8fafc;
            border-radius: 14px;
            border: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }

        .download-item:hover {
            border-color: var(--primary);
            background: #f0f7ff;
        }

        .format-info {
            display: flex;
            flex-direction: column;
        }

        .format-label {
            font-weight: 700;
            color: var(--text);
            font-size: 1rem;
        }

        .format-ext {
            font-size: 0.85rem;
            color: #64748b;
        }

        .btn-dl {
            padding: 10px 24px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-dl:hover {
            background: #059669;
            transform: scale(1.05);
        }

        .error-card {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            padding: 20px;
            border-radius: 16px;
            color: var(--danger);
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .container { padding: 25px; margin-top: 20px; }
            .header h1 { font-size: 2rem; }
            .input-group { flex-direction: column; }
            button#fetchBtn { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الذكي 🚀</h1>
        <p>النسخة v21 - المحرك الأكاديمي الشامل</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="أدخل رابط يوتيوب أو تيك توك هنا...">
        <button id="fetchBtn" onclick="fetchMedia()">تحليل الرابط</button>
    </div>

    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
        <div id="statusText" style="font-weight: bold;">جاري فحص السيرفرات العالمية...</div>
    </div>

    <div id="results"></div>
</div>

<script>
    // مصفوفة سيرفرات Invidious لليوتيوب (تجاوز الـ CORS وحظر الـ DNS)
    const invidiousInstances = [
        'https://invidious.flokinet.to',
        'https://inv.tux.pizza',
        'https://invidious.privacydev.net',
        'https://yewtu.be',
        'https://vid.priv.au'
    ];

    function getYoutubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function fetchMedia() {
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');
        const statusText = document.getElementById('statusText');
        const url = urlInput.value.trim();

        if (!url) {
            showError("وين الرابط حمودي؟ الحقل فارغ!");
            return;
        }

        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        try {
            const ytId = getYoutubeId(url);

            if (ytId) {
                // محاولة جلب البيانات من سيرفرات Invidious
                let success = false;
                for (let i = 0; i < invidiousInstances.length; i++) {
                    try {
                        statusText.innerText = `محاولة سيرفر يوتيوب ${i + 1}...`;
                        const response = await fetch(`${invidiousInstances[i]}/api/v1/videos/${ytId}`);
                        if (response.ok) {
                            const data = await response.json();
                            displayYoutubeResults(data);
                            success = true;
                            break;
                        }
                    } catch (e) {
                        console.warn(`سيرفر ${i} فشل، ننتقل للبعده...`);
                    }
                }
                if (!success) throw new Error("كل السيرفرات حالياً مشغولة، جرب بعد لحظات.");

            } else if (url.includes('tiktok.com')) {
                // محرك تيك توك المباشر
                statusText.innerText = "جاري سحب فيديو تيك توك...";
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if (data.code === 0) {
                    displayTiktokResults(data.data);
                } else {
                    throw new Error("تأكد من رابط التيك توك.");
                }
            } else {
                throw new Error("هذا الرابط غير مدعوم حالياً في هذه النسخة.");
            }
        } catch (error) {
            showError(error.message);
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function displayYoutubeResults(data) {
        const results = document.getElementById('results');
        // تصفية روابط الفيديو التي تحتوي على صوت وفيديو معاً
        const streams = data.formatStreams.filter(s => s.type === "video/mp4");
        
        results.innerHTML = `
            <div class="media-card">
                <div class="video-title">${data.title}</div>
                <div class="download-options">
                    ${streams.map(s => `
                        <div class="download-item">
                            <div class="format-info">
                                <span class="format-label">فيديو (${s.qualityLabel})</span>
                                <span class="format-ext">صيغة MP4</span>
                            </div>
                            <a href="${s.url}" class="btn-dl" target="_blank" download>تحميل</a>
                        </div>
                    `).join('')}
                    <div class="download-item">
                        <div class="format-info">
                            <span class="format-label">صوت فقط</span>
                            <span class="format-ext">MP3/M4A</span>
                        </div>
                        <a href="${data.adaptiveFormats.find(f => f.type.includes('audio')).url}" class="btn-dl" target="_blank">تحميل</a>
                    </div>
                </div>
            </div>`;
    }

    function displayTiktokResults(data) {
        const results = document.getElementById('results');
        results.innerHTML = `
            <div class="media-card">
                <div class="video-title">${data.title || 'فيديو تيك توك'}</div>
                <div class="download-options">
                    <div class="download-item">
                        <div class="format-info">
                            <span class="format-label">بدون علامة مائية</span>
                            <span class="format-ext">جودة عالية HD</span>
                        </div>
                        <a href="${data.play}" class="btn-dl" target="_blank">تحميل</a>
                    </div>
                    <div class="download-item">
                        <div class="format-info">
                            <span class="format-label">صوت الفيديو</span>
                            <span class="format-ext">MP3</span>
                        </div>
                        <a href="${data.music}" class="btn-dl" target="_blank">تحميل الصوت</a>
                    </div>
                </div>
            </div>`;
    }

    function showError(msg) {
        const results = document.getElementById('results');
        results.innerHTML = `<div class="error-card"><strong>خطأ:</strong> ${msg}</div>`;
    }

    document.getElementById('urlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchMedia();
    });
</script>
</body>
</html>
