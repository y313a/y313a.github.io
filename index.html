<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>v6 محمل حمودي الذكي | Universal Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --accent: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 15px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: background 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        #results {
            margin-top: 30px;
            display: grid;
            gap: 20px;
        }

        .media-card {
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fafafa;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .media-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .media-details h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        .download-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-dl {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-dl:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            .media-info { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>تحميل حمودي الذكي 🚀</h1>
        <p>انسخ الرابط وشوف السحر بداخل صفحتك!</p>
    </div>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="حط رابط يوتيوب، تيك توك، انستا...">
        <button id="fetchBtn" onclick="fetchVideo()">تحليل الرابط</button>
    </div>

    <div id="loader" class="loader">
        <div style="margin-bottom: 10px;">جاري سحب الملف بداخل صفحتك، اصبرلي حموديتي...</div>
        <img src="https://i.gifer.com/ZZ5H.gif" width="30" alt="loading">
    </div>

    <div id="results"></div>
</div>

<script>
    async function fetchVideo() {
        const urlInput = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('fetchBtn');
        const url = urlInput.value.trim();

        if (!url) {
            alert("وين الرابط حمودي؟ حطه بالمربع أول شي عيوني!");
            return;
        }

        loader.style.display = "block";
        results.innerHTML = "";
        btn.disabled = true;

        try {
            // استخدام محرك API بديل يدعم الطلبات المباشرة ويحل مشكلة CORS واليوتيوب
            // رح نستخدم نظام iframe الذكي بداخل كارت النتائج حتى ما تطلع من صفحتك
            const cleanUrl = url.split('?')[0];
            
            results.innerHTML = `
                <div class="media-card">
                    <div class="media-info">
                        <div class="media-details">
                            <h3>الرابط جاهز للتحميل ✅</h3>
                            <p style="font-size:0.9rem; color:#64748b;">اختر الجودة اللي تناسبك من القائمة أدناه واضغط Download:</p>
                            
                            <div id="downloadArea" style="width:100%; min-height:250px; margin-top:15px; border-radius:12px; overflow:hidden;">
                                <!-- استدعاء واجهة التحميل بداخل الـ Card مالتك وبدون تحويل خارجي -->
                                <iframe 
                                    src="https://loader.to/api/card/?url=${encodeURIComponent(url)}&color=2563eb" 
                                    style="width:100%; height:250px; border:none;" 
                                    scrolling="no">
                                </iframe>
                            </div>
                        </div>
                    </div>
                </div>
            `;

        } catch (error) {
            console.error('Error:', error);
            results.innerHTML = `<div style="text-align:center; color: #ef4444; padding: 20px;">صار خلل بالتحليل، تأكد من الرابط وجرب مرة ثانية حمودي!</div>`;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    document.getElementById('urlInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { fetchVideo(); }
    });
</script>
</body>
</html>
